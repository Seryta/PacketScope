# GitHub Actions CI — push / PR 触发全套静态检查 + 单测 + Roborazzi verify。
# 替换 v0.6 阶段的 Gitea 版本（.gitea/workflows/ci.yml 已删）。
#
# 设计哲学：把"过去几轮 review 反复修同类问题"沉淀的所有守护机制都跑一遍，
# review 边际效用持续递减。
#
# 跟 Gitea 版本的关键差异：
# 1. 不用 container: mingc/android-build-box — GitHub-hosted runner 自带 JDK 17
#    + Android SDK，配 setup-java/setup-android 比 docker-in-docker 快 3-5x，
#    缓存命中率更高
# 2. cmdline-tools-version pin 到具体值（round7 教训：floating tag 不可复现）
# 3. 加 Roborazzi diff artifact 上传，截图回归 fail 时方便本地对比

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Android lint (fail on new issues outside baseline)
        run: ./gradlew :app:lintDebug

      - name: detekt (fail on new issues outside baseline)
        run: ./gradlew detekt

      - name: Unit tests + Roborazzi verify
        run: ./gradlew :app:testDebugUnitTest verifyRoborazziDebug

      - name: Cross-cutting guards (version + targetSdk policy)
        run: ./gradlew checkVersionAlignment checkTargetSdkPolicy

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Roborazzi 失败时上传 diff 截图，便于本地对比
      - name: Upload Roborazzi diff on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: roborazzi-diff
          path: app/build/outputs/roborazzi/
          retention-days: 7
